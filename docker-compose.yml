services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: rgh-api-gateway
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: 3000
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://127.0.0.1:3001
      PROPERTY_SERVICE_URL: http://127.0.0.1:3002
      OPERATIONS_SERVICE_URL: http://127.0.0.1:3003
      BOOKING_SERVICE_URL: http://127.0.0.1:3004
      COMMUNITY_SERVICE_URL: http://127.0.0.1:3005
      NOTIFICATION_SERVICE_URL: http://127.0.0.1:3006
    depends_on:
      - auth-service
      - property-service
      - operations-service
      - booking-service
      - community-service
      - notification-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: rgh-auth-service
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 127.0.0.1
      PORT: 3001
      AUTH_PORT: 3001
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      AUTH_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    container_name: rgh-property-service
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 127.0.0.1
      PORT: 3002
      PROPERTY_PORT: 3002
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PROPERTY_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}

  operations-service:
    build:
      context: .
      dockerfile: services/operations-service/Dockerfile
    container_name: rgh-operations-service
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 127.0.0.1
      PORT: 3003
      OPERATIONS_PORT: 3003
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      OPERATIONS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}

  booking-service:

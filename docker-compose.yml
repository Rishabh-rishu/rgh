services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: rgh-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PROPERTY_SERVICE_URL: http://property-service:3002
      OPERATIONS_SERVICE_URL: http://operations-service:3003
      BOOKING_SERVICE_URL: http://booking-service:3004
      COMMUNITY_SERVICE_URL: http://community-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      - auth-service
      - property-service
      - operations-service
      - booking-service
      - community-service
      - notification-service
    networks:
      - rgh-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: rgh-auth-service
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      AUTH_PORT: 3001
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    container_name: rgh-property-service
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      PROPERTY_PORT: 3002
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

  operations-service:
    build:
      context: .
      dockerfile: services/operations-service/Dockerfile
    container_name: rgh-operations-service
    restart: unless-stopped
    expose:
      - "3003"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3003
      OPERATIONS_PORT: 3003
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: rgh-booking-service
    restart: unless-stopped
    expose:
      - "3004"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3004
      BOOKING_PORT: 3004
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

  community-service:
    build:
      context: .
      dockerfile: services/community-service/Dockerfile
    container_name: rgh-community-service
    restart: unless-stopped
    expose:
      - "3005"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3005
      COMMUNITY_PORT: 3005
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: rgh-notification-service
    restart: unless-stopped
    expose:
      - "3006"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3006
      NOTIFICATION_PORT: 3006
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - rgh-network

networks:
  rgh-network:
    driver: bridge
